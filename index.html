<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rev Syndicate</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background-image: url('img/topographic.png'); background-repeat: repeat; background-color: #ffffff; background-size: 400px; margin: 0;">

    <div id="Header">
        <header class="header">
            <h1 class="logo-text">Rev Syndicate.</h1>
        </header> 
    </div>

    <section class="hero-section">
        <img src="img/Veilsid.png" alt="Mazda RX-7 FD Veilside Fortune Showcase" class="hero-banner-img">
    </section>

    <main class="main-content">
        <h2 class="section-title">Brands:</h2>

        <div class="brands-grid">
            
            <a href="toyota.html" class="brand-card">
                <img src="img/ToyotaButton.png" alt="Toyota GR Supra" class="car-image">
                <span class="car-name">Toyota GR Supra</span>
            </a>

            <a href="honda.html" class="brand-card">
                <img src="img/HondButton.png" alt="Honda Civic Type R" class="car-image">
                <span class="car-name">Honda Civic Type R</span>
            </a>

            <a href="nissan.html" class="brand-card">
                <img src="img/NissaButton.png" alt="Nissan Z" class="car-image">
                <span class="car-name">Nissan Z</span>
            </a>

            <a href="mitsubishi.html" class="brand-card">
                <img src="img/MitsubishButton.png" alt="Mitsubishi Lancer Evo X" class="car-image">
                <span class="car-name">Mitsubishi Lancer Evo X</span>
            </a>

            <a href="subaru.html" class="brand-card">
                <img src="img/SubarButton.png" alt="Subaru WRX" class="car-image">
                <span class="car-name">Subaru WRX</span>
            </a>

            <a href="mazda.html" class="brand-card">
                <img src="img/MazdButton.png" alt="Mazda RX-7" class="car-image">
                <span class="car-name">Mazda RX-7</span>
            </a>

            <a href="acura.html" class="brand-card card-row-3">
                <img src="img/AcurButton.png" alt="Acura NSX" class="car-image">
                <span class="car-name">Acura NSX</span>
            </a>

            <a href="lexus.html" class="brand-card card-row-3">
                <img src="img/LexuButton.png" alt="Lexus LC500" class="car-image">
                <span class="car-name">Lexus LC500</span>
            </a>

        </div>
    </main>

<footer class="footer">
        <!-- Added style="color: #ffffff;" directly to the paragraph tag -->
        <p style="color: #000000; margin: 0; text-align: center;">&copy; 2026 Garage Anis | All Rights Reserved</p>
